<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- index-v9.html | v9 | CR008 - Property cards now have View in Chat (expanded detail) and View on Website buttons -->
  <title>Hailey – D.R. Horton AI Home Advisor v9</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f2f2f2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.025;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 40px, #c8102e 40px, #c8102e 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, #c8102e 40px, #c8102e 41px);
      pointer-events: none;
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(200,16,46,0.4); }
      50%       { box-shadow: 0 0 0 12px rgba(200,16,46,0); }
    }

    .msg-enter { animation: fadeUp 0.35s ease forwards; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #f0f0f0; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #c8102e; }

    /* ── Return to menu button ── */
    #return-menu-btn {
      display: none;
      margin-left: 44px;
      margin-top: 2px;
    }
    #return-menu-btn button {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 11.5px;
      font-weight: 600;
      color: #c8102e;
      cursor: pointer;
      font-family: 'Lato', sans-serif;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #return-menu-btn button:hover {
      background: #fff5f6;
      border-color: #c8102e;
      transform: translateY(-1px);
    }

    /* ── Property cards ── */
    .prop-cards { display: flex; flex-direction: column; gap: 12px; padding-left: 44px; width: 100%; }

    .prop-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      max-width: 320px;
      transition: box-shadow 0.2s;
    }
    .prop-card:hover { box-shadow: 0 4px 20px rgba(200,16,46,0.15); }

    /* Photo carousel */
    .prop-carousel { position: relative; height: 160px; background: #f0f0f0; overflow: hidden; }
    .prop-carousel img {
      width: 100%; height: 100%; object-fit: cover;
      display: block; transition: opacity 0.4s;
    }
    .prop-carousel img.loading { opacity: 0; }
    .prop-carousel img.loaded  { opacity: 1; }
    .carousel-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #f8e8ea, #fdf0f2);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
    }

    /* Series badge overlaid on photo */
    .series-badge {
      position: absolute; top: 10px; left: 10px;
      background: linear-gradient(135deg, #c8102e, #8b0000);
      color: #fff; font-size: 10px; font-weight: 700;
      padding: 3px 9px; border-radius: 20px;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .status-badge {
      position: absolute; top: 10px; right: 10px;
      font-size: 10px; font-weight: 700;
      padding: 3px 9px; border-radius: 20px;
      letter-spacing: 0.3px;
    }
    .status-available { background: #dcfce7; color: #166534; }
    .status-limited   { background: #fef9c3; color: #854d0e; }
    .status-soon      { background: #e0f2fe; color: #075985; }

    /* Card body */
    .prop-body { padding: 12px 14px; }
    .prop-name { font-size: 14px; font-weight: 700; color: #1a1a1a; margin-bottom: 2px; }
    .prop-city { font-size: 11px; color: #888; margin-bottom: 10px; }

    .prop-stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px; margin-bottom: 10px;
    }
    .prop-stat { display: flex; flex-direction: column; }
    .prop-stat-val { font-size: 13px; font-weight: 700; color: #222; }
    .prop-stat-lbl { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 0.3px; }

    .prop-amenities {
      font-size: 11px; color: #666;
      border-top: 1px solid #f0f0f0;
      padding-top: 8px; margin-bottom: 10px;
      line-height: 1.5;
    }
    .prop-offer {
      font-size: 11px; font-weight: 600; color: #c8102e;
      background: #fff5f6; border-radius: 6px;
      padding: 5px 8px; margin-bottom: 10px;
    }

    .prop-footer { display: flex; gap: 8px; }
    .prop-btn-primary {
      flex: 1; padding: 8px;
      background: linear-gradient(135deg, #c8102e, #8b0000);
      color: #fff; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: 'Lato', sans-serif;
      text-decoration: none; text-align: center;
      transition: filter 0.15s;
    }
    .prop-btn-primary:hover { filter: brightness(0.9); }
    .prop-btn-secondary {
      flex: 1; padding: 8px 12px;
      background: #f7f7f7; color: #555;
      border: 1px solid #e0e0e0; border-radius: 8px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: 'Lato', sans-serif;
      text-align: center; text-decoration: none;
      transition: all 0.15s; display: block;
    }
    .prop-btn-secondary:hover { border-color: #c8102e; color: #c8102e; background: #fff5f6; }

    /* ── Expanded detail panel ── */
    .prop-expanded {
      display: none;
      border-top: 1px solid #f0f0f0;
      padding: 10px 14px 4px;
      animation: fadeUp 0.25s ease forwards;
    }
    .prop-expanded.open { display: block; }
    .prop-expanded-row {
      display: flex; gap: 6px; align-items: flex-start;
      font-size: 11.5px; color: #444; margin-bottom: 7px; line-height: 1.5;
    }
    .prop-expanded-row .exp-icon { flex-shrink: 0; font-size: 13px; margin-top: 1px; }
    .prop-expanded-row a {
      color: #c8102e; font-weight: 600; text-decoration: none;
      word-break: break-all;
    }
    .prop-expanded-row a:hover { text-decoration: underline; }
    .prop-expand-close {
      font-size: 11px; color: #aaa; cursor: pointer;
      text-align: right; padding: 4px 0 6px;
      display: block;
    }
    .prop-expand-close:hover { color: #c8102e; }

    #chat-card {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      max-height: 90vh;
      position: relative;
    }

    #chat-header {
      background: linear-gradient(135deg, #c8102e 0%, #8b0000 100%);
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    #chat-header::before {
      content: '';
      position: absolute; right: -20px; top: -20px;
      width: 120px; height: 120px;
      border-radius: 50%; background: rgba(255,255,255,0.05);
    }
    #chat-header::after {
      content: '';
      position: absolute; right: 40px; bottom: -30px;
      width: 80px; height: 80px;
      border-radius: 50%; background: rgba(255,255,255,0.05);
    }
    #avatar-h {
      width: 46px; height: 46px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-weight: 700; font-size: 22px; color: #fff;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.2);
      animation: pulse 2.5s infinite;
      position: relative; z-index: 1; flex-shrink: 0;
    }
    #header-text { position: relative; z-index: 1; }
    #header-text .name {
      font-family: 'Playfair Display', serif;
      font-weight: 700; font-size: 17px; color: #fff; letter-spacing: 0.3px;
    }
    #header-text .subtitle {
      font-size: 11px; color: rgba(255,255,255,0.75);
      letter-spacing: 1px; text-transform: uppercase; font-weight: 300;
    }
    #online-badge {
      margin-left: auto; position: relative; z-index: 1;
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 20px; padding: 4px 10px;
      font-size: 11px; color: #fff; font-weight: 300;
    }
    .green-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #4ade80; box-shadow: 0 0 6px #4ade80;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: none;
      background: #fff;
      border-bottom: 1px solid #eeeeee;
      padding: 8px 16px;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .tool-btn {
      display: flex; align-items: center; gap: 5px;
      background: #f7f7f7;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 11.5px; font-weight: 600;
      color: #444;
      cursor: pointer;
      transition: all 0.18s;
      font-family: 'Lato', sans-serif;
      letter-spacing: 0.2px;
    }
    .tool-btn:hover { background: #fff5f6; border-color: #c8102e; color: #c8102e; }
    .tool-btn svg { flex-shrink: 0; }
    .tool-btn.danger:hover { background: #fff0f0; border-color: #c8102e; color: #c8102e; }

    /* ── Confirm overlay ── */
    #confirm-overlay {
      display: none;
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(4px);
      z-index: 10;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 30px;
      text-align: center;
      border-radius: 16px;
    }
    #confirm-overlay.show { display: flex; }
    #confirm-overlay p {
      font-size: 14px; color: #333; font-weight: 600; line-height: 1.5;
    }
    #confirm-overlay small { font-size: 12px; color: #888; }
    .confirm-btns { display: flex; gap: 10px; margin-top: 4px; }
    .confirm-yes {
      background: linear-gradient(135deg, #c8102e, #8b0000);
      color: #fff; border: none; border-radius: 8px;
      padding: 9px 22px; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: 'Lato', sans-serif;
      box-shadow: 0 4px 12px rgba(200,16,46,0.3);
      transition: all 0.2s;
    }
    .confirm-yes:hover { filter: brightness(0.9); transform: scale(1.03); }
    .confirm-no {
      background: #f0f0f0; color: #555;
      border: 1px solid #ddd; border-radius: 8px;
      padding: 9px 22px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: 'Lato', sans-serif;
      transition: all 0.2s;
    }
    .confirm-no:hover { background: #e8e8e8; }

    #messages {
      flex: 1; overflow-y: auto;
      padding: 20px 18px;
      display: flex; flex-direction: column;
      gap: 14px;
      min-height: 320px; max-height: 420px;
      background: #fafafa;
    }

    #welcome {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; gap: 18px; padding: 20px 10px; text-align: center;
    }
    #welcome-icon {
      width: 70px; height: 70px; border-radius: 50%;
      background: linear-gradient(135deg, #c8102e, #8b0000);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; box-shadow: 0 8px 30px rgba(200,16,46,0.4);
    }
    #welcome h2 {
      font-family: 'Playfair Display', serif;
      font-size: 20px; color: #1a1a1a; margin-bottom: 8px;
    }
    #welcome p {
      font-size: 13px; color: #777;
      line-height: 1.6; max-width: 300px;
    }
    #start-btn {
      background: linear-gradient(135deg, #c8102e, #8b0000);
      color: #fff; border: none; border-radius: 50px;
      padding: 13px 32px; font-size: 14px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.5px;
      box-shadow: 0 6px 24px rgba(200,16,46,0.45);
      transition: all 0.2s; font-family: 'Lato', sans-serif;
    }
    #start-btn:hover { background: #a50d26; transform: scale(1.05); }
    #start-btn:active { transform: scale(0.97); }

    .msg-row { display: flex; gap: 10px; align-items: flex-end; }
    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-family: 'Playfair Display', serif;
      font-weight: 700; font-size: 12px; color: #fff;
    }
    .avatar.bot  { background: #c8102e; box-shadow: 0 2px 8px rgba(200,16,46,0.25); }
    .avatar.human{ background: #333333; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }

    .bubble {
      max-width: 78%; padding: 11px 15px;
      font-size: 13.5px; line-height: 1.65;
      white-space: pre-wrap;
    }
    .bubble.bot {
      background: #ffffff;
      border: 1px solid #e8e8e8;
      border-radius: 18px 18px 18px 4px;
      color: #222222;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .bubble.user {
      background: linear-gradient(135deg, #c8102e, #8b0000);
      border-radius: 18px 18px 4px 18px;
      box-shadow: 0 4px 16px rgba(200,16,46,0.3);
      color: #fff;
    }

    /* ── Thinking indicator ── */
    #typing-row { display: none; }

    @keyframes thinking-pulse {
      0%, 100% { transform: scale(1); opacity: 0.35; }
      50%       { transform: scale(1.55); opacity: 1; }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes hailey-spin {
      to { transform: rotate(360deg); }
    }

    .thinking-bubble {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px;
      background: #ffffff;
      border: 1px solid #e8e8e8;
      border-radius: 18px 18px 18px 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .thinking-spinner {
      width: 16px; height: 16px; flex-shrink: 0;
      border: 2px solid rgba(200,16,46,0.15);
      border-top-color: #c8102e;
      border-radius: 50%;
      animation: hailey-spin 0.75s linear infinite;
    }
    .thinking-text {
      font-size: 12px; font-weight: 400; letter-spacing: 0.4px;
      background: linear-gradient(90deg,
        #aaaaaa 0%,
        #333333 30%,
        rgba(200,16,46,0.9) 50%,
        #333333 70%,
        #aaaaaa 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 1.8s linear infinite;
      white-space: nowrap;
    }
    .thinking-dots { display: flex; gap: 4px; align-items: center; margin-left: 2px; }
    .tdot {
      width: 5px; height: 5px; border-radius: 50%; background: #c8102e;
      animation: thinking-pulse 1.1s ease-in-out infinite;
    }
    .tdot:nth-child(2) { animation-delay: 0.18s; }
    .tdot:nth-child(3) { animation-delay: 0.36s; }

    #suggestions { display: none; flex-wrap: wrap; gap: 7px; padding-left: 44px; }
    .chip {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 20px; padding: 6px 13px;
      font-size: 11.5px; color: #555;
      cursor: pointer; transition: all 0.18s; font-family: 'Lato', sans-serif;
    }
    .chip:hover { background: #fff5f6; border-color: #c8102e; color: #c8102e; transform: translateY(-1px); }

    #input-area {
      display: none; padding: 14px 16px;
      border-top: 1px solid #eeeeee;
      background: #ffffff;
      gap: 10px; align-items: flex-end; flex-shrink: 0;
    }
    #chat-input {
      flex: 1; background: #f7f7f7;
      border: 1px solid #e0e0e0;
      border-radius: 14px; padding: 10px 14px;
      color: #222; font-size: 13.5px;
      resize: none; font-family: 'Lato', sans-serif;
      line-height: 1.5; transition: border-color 0.2s, box-shadow 0.2s;
      max-height: 90px; overflow-y: auto;
    }
    #chat-input::placeholder { color: #aaa; }
    #chat-input:focus {
      outline: none; border-color: #c8102e;
      box-shadow: 0 0 0 3px rgba(200,16,46,0.08);
      background: #fff;
    }
    #send-btn {
      background: rgba(255,255,255,0.08);
      border: none; border-radius: 12px;
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; flex-shrink: 0;
    }
    #send-btn.active {
      background: linear-gradient(135deg, #c8102e, #8b0000);
      box-shadow: 0 4px 14px rgba(200,16,46,0.4);
    }
    #send-btn.active:hover { filter: brightness(0.9); transform: scale(1.05); }
    #send-btn:active { transform: scale(0.97); }

    #chat-footer {
      padding: 8px 16px 12px; text-align: center;
      font-size: 10.5px; color: #bbb;
      letter-spacing: 0.5px; background: #fff;
      border-top: 1px solid #f0f0f0; flex-shrink: 0;
    }
  </style>
</head>
<body>

<div id="chat-card">

  <div id="chat-header">
    <div id="avatar-h">H</div>
    <div id="header-text">
      <div class="name">Hailey</div>
      <div class="subtitle">D.R. Horton · Home Advisor</div>
    </div>
    <div id="online-badge">
      <div class="green-dot"></div>
      Online
    </div>
  </div>

  <!-- Confirm overlay (shared for new/end actions) -->
  <div id="confirm-overlay">
    <p id="confirm-msg">Are you sure?</p>
    <small id="confirm-sub"></small>
    <div class="confirm-btns">
      <button class="confirm-no" onclick="closeConfirm()">Cancel</button>
      <button class="confirm-yes" id="confirm-yes-btn" onclick="confirmAction()">Yes, continue</button>
    </div>
  </div>

  <!-- Toolbar (shown after chat starts) -->
  <div id="toolbar">
    <button class="tool-btn" onclick="askNewConversation()" title="Start a new conversation">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        <line x1="12" y1="8" x2="12" y2="14"/><line x1="9" y1="11" x2="15" y2="11"/>
      </svg>
      New Chat
    </button>
    <button class="tool-btn danger" onclick="askEndConversation()" title="End this conversation">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      End Chat
    </button>
    <button class="tool-btn" onclick="exportTranscript()" title="Download transcript as TXT">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Export Transcript
    </button>
  </div>

  <div id="messages">
    <div id="welcome">
      <div id="welcome-icon">🏠</div>
      <div>
        <h2>Find Your Perfect Home</h2>
        <p>Chat with Hailey, our AI home advisor — available 24/7 to answer your questions and guide your search.</p>
      </div>
      <button id="start-btn" onclick="startChat()">Start Chatting →</button>
    </div>

    <div id="typing-row" class="msg-row">
      <div class="avatar bot">H</div>
      <div class="thinking-bubble">
        <div class="thinking-spinner"></div>
        <span class="thinking-text">Hailey is thinking</span>
        <div class="thinking-dots">
          <div class="tdot"></div>
          <div class="tdot"></div>
          <div class="tdot"></div>
        </div>
      </div>
    </div>

    <div id="suggestions">
      <button class="chip" onclick="sendMessage('What homes do you have available in Maryland?')">What homes are available in Maryland?</button>
      <button class="chip" onclick="sendMessage('What\'s the difference between your home series?')">What's the difference between your home series?</button>
      <button class="chip" onclick="sendMessage('What homes do you have under $400,000?')">Homes under $400,000?</button>
      <button class="chip" onclick="sendMessage('Do you have any 4 bedroom homes available?')">Do you have 4 bedroom homes?</button>
      <button class="chip" onclick="sendMessage('How does DHI Mortgage financing work?')">How does financing work?</button>
      <button class="chip" onclick="sendMessage('What smart home features are included?')">What smart home features are included?</button>
    </div>

    <!-- Return to menu button -->
    <div id="return-menu-btn">
      <button onclick="returnToMenu()">&#8592; Main Menu</button>
    </div>

    <div id="scroll-anchor"></div>
  </div>

  <div id="input-area">
    <textarea
      id="chat-input"
      placeholder="Ask about homes, communities, financing…"
      rows="1"
      onkeydown="handleKey(event)"
      oninput="updateSendBtn()"
    ></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div id="chat-footer">
    Powered by AI · D.R. Horton © 2025 · America's Builder
  </div>

</div>

<script>
  const API_ENDPOINT = '/.netlify/functions/chat';

  let messages   = [];
  let isLoading  = false;
  let chatEnded  = false;
  let pendingAction = null; // 'new' | 'end'

  // ── Scroll ──────────────────────────────────────────────────────────────
  function scrollToBottom() {
    document.getElementById('scroll-anchor').scrollIntoView({ behavior: 'smooth' });
  }

  // ── Typing indicator ─────────────────────────────────────────────────────
  function showTyping(show) {
    const row    = document.getElementById('typing-row');
    const anchor = document.getElementById('scroll-anchor');
    const msgs   = document.getElementById('messages');
    if (show) {
      msgs.insertBefore(row, anchor);
      row.style.display = 'flex';
      anchor.scrollIntoView({ behavior: 'smooth' });
    } else {
      row.style.display = 'none';
    }
  }

  // ── Parse and strip CARDS:: block from reply ────────────────────────────
  function extractCards(text) {
    const marker = 'CARDS::';
    const idx = text.indexOf(marker);
    if (idx === -1) return { text: text.trim(), cards: null };
    const clean = text.slice(0, idx).trim();
    try {
      const json  = text.slice(idx + marker.length).trim();
      const cards = JSON.parse(json);
      return { text: clean, cards: Array.isArray(cards) ? cards : null };
    } catch {
      return { text: clean, cards: null };
    }
  }

  // ── Render a single property card ────────────────────────────────────────
  function buildPropertyCard(c) {
    const id       = 'card-' + Math.random().toString(36).slice(2, 8);
    const priceFrom = Number(c.priceFrom);
    const priceTo   = Number(c.priceTo);
    const priceStr  = priceTo && priceTo !== priceFrom
      ? `$${priceFrom.toLocaleString()} – $${priceTo.toLocaleString()}`
      : `From $${priceFrom.toLocaleString()}`;

    const sqftFrom = Number(c.sqftFrom);
    const sqftTo   = Number(c.sqftTo);
    const sqftStr  = sqftTo ? `${sqftFrom.toLocaleString()}–${sqftTo.toLocaleString()}` : sqftFrom.toLocaleString();

    const statusClass = {
      'Available':   'status-available',
      'Limited':     'status-limited',
      'Coming Soon': 'status-soon',
    }[c.status] || 'status-available';

    const photoHtml = c.photoUrl
      ? `<img class="loading" src="${c.photoUrl}" alt="${c.name}"
           onload="this.classList.remove('loading');this.classList.add('loaded')"
           onerror="this.parentElement.innerHTML='<div class=\\'carousel-placeholder\\'>🏠</div>'" />`
      : `<div class="carousel-placeholder">🏠</div>`;

    const offerHtml = c.specialOffer
      ? `<div class="prop-offer">🎁 ${c.specialOffer}</div>` : '';

    const amenitiesHtml = c.amenities
      ? `<div class="prop-amenities">📍 ${c.amenities}</div>` : '';

    // View on Website button — opens listing in new tab
    const websiteBtn = c.listingUrl
      ? `<a class="prop-btn-secondary" href="${c.listingUrl}" target="_blank" rel="noopener">View on Website ↗</a>`
      : `<span class="prop-btn-secondary" style="opacity:0.4;cursor:default">No Listing Yet</span>`;

    // Expanded detail panel
    const expandedRows = [
      c.amenities    ? `<div class="prop-expanded-row"><span class="exp-icon">📍</span><span><b>Amenities:</b> ${c.amenities}</span></div>` : '',
      c.specialOffer ? `<div class="prop-expanded-row"><span class="exp-icon">🎁</span><span><b>Special Offer:</b> ${c.specialOffer}</span></div>` : '',
      `<div class="prop-expanded-row"><span class="exp-icon">🏘️</span><span><b>Lots Available:</b> ${c.lotsAvailable || '—'}</span></div>`,
      `<div class="prop-expanded-row"><span class="exp-icon">📐</span><span><b>Sq Ft:</b> ${sqftStr}</span></div>`,
      c.listingUrl   ? `<div class="prop-expanded-row"><span class="exp-icon">🔗</span><span><b>Listing:</b> <a href="${c.listingUrl}" target="_blank" rel="noopener">${c.listingUrl}</a></span></div>` : '',
    ].filter(Boolean).join('');

    return `
      <div class="prop-card" id="${id}">
        <div class="prop-carousel">
          ${photoHtml}
          <span class="series-badge">${c.series}</span>
          <span class="status-badge ${statusClass}">${c.status}</span>
        </div>
        <div class="prop-body">
          <div class="prop-name">${c.name}</div>
          <div class="prop-city">${c.city}, ${c.state || 'MD'}</div>
          <div class="prop-stats">
            <div class="prop-stat">
              <span class="prop-stat-val">${priceStr}</span>
              <span class="prop-stat-lbl">Price Range</span>
            </div>
            <div class="prop-stat">
              <span class="prop-stat-val">${c.bedrooms} bed</span>
              <span class="prop-stat-lbl">Bedrooms</span>
            </div>
          </div>
          <div class="prop-footer">
            <button class="prop-btn-primary" onclick="toggleExpanded('${id}')">View in Chat 🏠</button>
            ${websiteBtn}
          </div>
        </div>
        <div class="prop-expanded" id="${id}-exp">
          ${expandedRows}
          <span class="prop-expand-close" onclick="toggleExpanded('${id}')">▲ Close details</span>
        </div>
      </div>`;
  }

  // ── Toggle expanded card detail ───────────────────────────────────────────
  function toggleExpanded(id) {
    const panel = document.getElementById(id + '-exp');
    const btn   = document.querySelector(`#${id} .prop-btn-primary`);
    const isOpen = panel.classList.contains('open');
    panel.classList.toggle('open');
    btn.textContent = isOpen ? 'View in Chat 🏠' : 'Close Details ▲';
    scrollToBottom();
  }

  // ── Add a message bubble ─────────────────────────────────────────────────
  function addMessage(role, content) {
    messages.push({ role, content });

    const messagesEl = document.getElementById('messages');
    const anchor     = document.getElementById('scroll-anchor');

    if (role === 'assistant') {
      const { text, cards } = extractCards(content);

      // Text bubble
      const row = document.createElement('div');
      row.className = 'msg-row msg-enter';
      const avatar = document.createElement('div');
      avatar.className = 'avatar bot';
      avatar.textContent = 'H';
      const bubble = document.createElement('div');
      bubble.className = 'bubble bot';
      bubble.textContent = text;
      row.appendChild(avatar);
      row.appendChild(bubble);
      messagesEl.insertBefore(row, anchor);

      // Property cards
      if (cards && cards.length > 0) {
        const cardsRow = document.createElement('div');
        cardsRow.className = 'prop-cards msg-enter';
        cardsRow.innerHTML = cards.map(buildPropertyCard).join('');
        messagesEl.insertBefore(cardsRow, anchor);
      }

    } else {
      const row = document.createElement('div');
      row.className = 'msg-row msg-enter user';
      const avatar = document.createElement('div');
      avatar.className = 'avatar human';
      avatar.textContent = 'You';
      const bubble = document.createElement('div');
      bubble.className = 'bubble user';
      bubble.textContent = content;
      row.appendChild(avatar);
      row.appendChild(bubble);
      messagesEl.insertBefore(row, anchor);
    }

    scrollToBottom();
  }

  // ── Start conversation ───────────────────────────────────────────────────
  async function startChat() {
    document.getElementById('welcome').style.display = 'none';
    document.getElementById('input-area').style.display = 'flex';
    document.getElementById('toolbar').style.display = 'flex';
    chatEnded = false;
    showTyping(true);
    isLoading = true;

    try {
      const res  = await fetch(API_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: [{ role: 'user', content: 'Hello, I just landed on drhorton.com' }],
          includeInventory: true
        })
      });
      const data = await res.json();
      showTyping(false);
      addMessage('assistant', data.reply || "Hi there, welcome to D.R. Horton — America's Builder! I'm Hailey, your AI home advisor. What brings you here today?");
      showSuggestions();
    } catch {
      showTyping(false);
      addMessage('assistant', "Hi there, welcome to D.R. Horton — America's Builder! I'm Hailey, your AI home advisor. What brings you here today?");
      showSuggestions();
    }

    isLoading = false;
    document.getElementById('chat-input').focus();
  }

  // ── Suggestion chips ─────────────────────────────────────────────────────
  function showSuggestions() {
    const el     = document.getElementById('suggestions');
    const anchor = document.getElementById('scroll-anchor');
    document.getElementById('messages').insertBefore(el, anchor);
    el.style.display = 'flex';
    el.classList.add('msg-enter');
    // Hide return button when chips are visible
    document.getElementById('return-menu-btn').style.display = 'none';
    scrollToBottom();
  }

  // ── Return to main menu ───────────────────────────────────────────────────
  function returnToMenu() {
    const sugg   = document.getElementById('suggestions');
    const btn    = document.getElementById('return-menu-btn');
    const anchor = document.getElementById('scroll-anchor');
    const msgs   = document.getElementById('messages');

    // Re-insert and show chips
    msgs.insertBefore(sugg, anchor);
    sugg.style.display = 'flex';

    // Hide return button
    btn.style.display = 'none';

    scrollToBottom();
  }

  // ── Send message ─────────────────────────────────────────────────────────
  async function sendMessage(text) {
    if (isLoading || chatEnded) return;
    const input    = document.getElementById('chat-input');
    const userText = text || input.value.trim();
    if (!userText) return;

    input.value = '';
    updateSendBtn();
    document.getElementById('suggestions').style.display = 'none';

    // Show return to menu button once chips are hidden
    const returnBtn = document.getElementById('return-menu-btn');
    const anchor    = document.getElementById('scroll-anchor');
    document.getElementById('messages').insertBefore(returnBtn, anchor);
    returnBtn.style.display = 'block';

    addMessage('user', userText);
    showTyping(true);
    isLoading = true;

    try {
      const res  = await fetch(API_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, includeInventory: true })
      });
      const data = await res.json();
      showTyping(false);
      addMessage('assistant', data.reply || "I'm sorry, I had trouble with that. Could you rephrase?");
    } catch {
      showTyping(false);
      addMessage('assistant', "I'm having a connection issue. Please try again in a moment.");
    }

    isLoading = false;
    setTimeout(() => document.getElementById('chat-input').focus(), 100);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function updateSendBtn() {
    const btn = document.getElementById('send-btn');
    btn.className = document.getElementById('chat-input').value.trim() ? 'active' : '';
  }

  // ── Confirm overlay ──────────────────────────────────────────────────────
  function showConfirm(action) {
    pendingAction = action;
    const msg = document.getElementById('confirm-msg');
    const sub = document.getElementById('confirm-sub');
    if (action === 'new') {
      msg.textContent = 'Start a new conversation?';
      sub.textContent = 'Your current chat will be cleared.';
    } else {
      msg.textContent = 'End this conversation?';
      sub.textContent = 'You can export the transcript before closing.';
    }
    document.getElementById('confirm-overlay').classList.add('show');
  }

  function closeConfirm() {
    document.getElementById('confirm-overlay').classList.remove('show');
    pendingAction = null;
  }

  function confirmAction() {
    const action = pendingAction;
    closeConfirm();
    if (action === 'new') newConversation();
    else if (action === 'end') endConversation();
  }

  function askNewConversation() { showConfirm('new'); }
  function askEndConversation()  { showConfirm('end'); }

  // ── New conversation ─────────────────────────────────────────────────────
  function newConversation() {
    resetToWelcome();
  }

  // ── End conversation ─────────────────────────────────────────────────────
  function endConversation() {
    chatEnded = true;

    // Show Hailey's goodbye in the chat briefly, then reset after a short delay
    addMessage('assistant', "Thanks for chatting — it was great helping you today! Feel free to come back anytime. 🏠");

    // Disable input immediately
    const input = document.getElementById('chat-input');
    input.disabled = true;
    input.placeholder = 'Conversation ended.';
    document.getElementById('send-btn').className = '';

    // After 2.5s reset everything to welcome screen so next open is fresh
    setTimeout(() => {
      resetToWelcome();
    }, 2500);
  }

  // ── Reset to welcome (shared by New Chat and End Chat) ───────────────────
  function resetToWelcome() {
    messages  = [];
    chatEnded = false;

    const messagesEl = document.getElementById('messages');
    const keep = ['welcome', 'typing-row', 'suggestions', 'scroll-anchor'];
    Array.from(messagesEl.children).forEach(child => {
      if (!keep.includes(child.id)) child.remove();
    });

    const sugg = document.getElementById('suggestions');
    sugg.style.display = 'none';
    document.getElementById('return-menu-btn').style.display = 'none';

    const input = document.getElementById('chat-input');
    input.disabled = false;
    input.placeholder = 'Ask about homes, communities, financing…';
    input.value = '';
    updateSendBtn();

    document.getElementById('welcome').style.display = 'flex';
    document.getElementById('input-area').style.display = 'none';
    document.getElementById('toolbar').style.display = 'none';
  }

  // ── Export transcript ────────────────────────────────────────────────────
  function exportTranscript() {
    if (messages.length === 0) {
      alert('No conversation to export yet.');
      return;
    }

    // Format: MMDDYY HHMM
    const now   = new Date();
    const mm    = String(now.getMonth() + 1).padStart(2, '0');
    const dd    = String(now.getDate()).padStart(2, '0');
    const yy    = String(now.getFullYear()).slice(-2);
    const hh    = String(now.getHours()).padStart(2, '0');
    const min   = String(now.getMinutes()).padStart(2, '0');
    const stamp = `${mm}${dd}${yy} ${hh}${min}`;
    const filename = `transcript ${stamp}.txt`;

    const header = [
      'D.R. Horton – Hailey AI Home Advisor',
      'Conversation Transcript',
      `Date: ${now.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' })}`,
      `Time: ${now.toLocaleTimeString('en-US')}`,
      '─'.repeat(50),
      '',
    ].join('\n');

    const body = messages.map(m => {
      const speaker = m.role === 'user' ? 'You' : 'Hailey';
      return `${speaker}:\n${m.content}`;
    }).join('\n\n');

    const footer = [
      '',
      '─'.repeat(50),
      'Powered by AI · D.R. Horton · America\'s Builder',
      'drhorton.com',
    ].join('\n');

    const blob = new Blob([header + body + footer], { type: 'text/plain' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
