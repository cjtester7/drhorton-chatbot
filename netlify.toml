# netlify.toml | v10 | CR010 - Points to index-v10.html
# netlify.toml | v10 | CR008 - Points to index-v10.html
# netlify.toml – v10

[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/.netlify/functions/*"
  to   = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/"
  to   = "/index-v10.html"
  status = 200
