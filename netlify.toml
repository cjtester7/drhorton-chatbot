# netlify.toml – v3

[build]
  publish = "."
  functions = "netlify/functions"

# Route all API calls through the serverless function
[[redirects]]
  from = "/.netlify/functions/*"
  to   = "/.netlify/functions/:splat"
  status = 200

# Serve index-v3.html as the default page
[[redirects]]
  from = "/"
  to   = "/index-v3.html"
  status = 200
