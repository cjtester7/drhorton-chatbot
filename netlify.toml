# netlify.toml | v9 | CR008 - Points to index-v9.html
# netlify.toml – v9

[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/.netlify/functions/*"
  to   = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/"
  to   = "/index-v9.html"
  status = 200
